<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 Угадай трек</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .game-card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .game-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .game-subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .game-score {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 600;
            margin: 16px 0;
        }
        
        .track-name {
            font-size: 26px;
            font-weight: 700;
            margin: 20px 0;
            line-height: 1.3;
        }
        
        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }
        
        .option-btn {
            padding: 16px;
            background: var(--tg-theme-button-bg-color, #e9ecef);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn:hover {
            background: var(--tg-theme-button-color, #007aff);
            color: white;
        }
        
        .result-message {
            margin: 20px 0;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
        }
        
        .correct {
            background: #d4edda;
            color: #155724;
        }
        
        .incorrect {
            background: #f8d7da;
            color: #721c24;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-card">
            <div class="game-header">
                <h1>🎮 Угадай трек</h1>
                <div class="game-subtitle">Угадайте исполнителя по фрагменту песни</div>
            </div>

            <div class="game-score">Счёт: <span id="score">0</span></div>

            <div class="track-name" id="track-info">Загрузка...</div>

            <audio id="audio-player" controls style="width: 100%; margin: 20px 0;">
                Ваш браузер не поддерживает аудио.
            </audio>

            <div class="options" id="options-container">
                <!-- Варианты ответов будут генерироваться здесь -->
            </div>

            <div class="result-message" id="result-message" style="display: none;"></div>

            <div class="controls">
                <button class="option-btn" id="skip-btn">Пропустить</button>
                <button class="option-btn" id="new-game-btn">Новая игра</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Элементы DOM
        const scoreEl = document.getElementById('score');
        const trackInfoEl = document.getElementById('track-info');
        const audioPlayer = document.getElementById('audio-player');
        const optionsContainer = document.getElementById('options-container');
        const resultMessageEl = document.getElementById('result-message');
        const skipBtn = document.getElementById('skip-btn');
        const newGameBtn = document.getElementById('new-game-btn');

        // Данные игры
        let currentTrack = null;
        let score = 0;

        // Заглушка для получения трека (замените на реальный API)
        function getRandomTrack() {
            return {
                title: "Believer",
                artist: "Imagine Dragons",
                audioUrl: "https://example.com/track.mp3",
                options: ["Imagine Dragons", "Linkin Park", "Coldplay", "OneRepublic"]
            };
        }

        // Запуск нового раунда
        function startNewRound() {
            currentTrack = getRandomTrack();
            trackInfoEl.textContent = `"${currentTrack.title}"`;
            audioPlayer.src = currentTrack.audioUrl;

            // Очищаем предыдущие варианты
            optionsContainer.innerHTML = '';
            resultMessageEl.style.display = 'none';

            // Создаём кнопки с вариантами
            currentTrack.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(btn);
            });
        }

        // Проверка ответа
        function checkAnswer(selectedOption) {
            const isCorrect = selectedOption === currentTrack.artist;

            if (isCorrect) {
                score++;
                scoreEl.textContent = score;
                resultMessageEl.textContent = "✅ Правильно! + 1 очко";
                resultMessageEl.className = "result-message correct";
            } else {
                resultMessageEl.textContent = `❌ Неверно! Правильный ответ: ${currentTrack.artist}`;
                resultMessageEl.className = "result-message incorrect";
            }

            resultMessageEl.style.display = 'block';
            setTimeout(startNewRound, 2000); // Следующий раунд через 2 секунды
        }

        // Обработчики кнопок
        skipBtn.addEventListener('click', startNewRound);
        newGameBtn.addEventListener('click', () => {
            score = 0;
            scoreEl.textContent = score;
            startNewRound();
        });

        // Запуск игры при загрузке
        window.addEventListener('load', startNewRound);
    </script>
</body>
</html>
